function navigate(view, extra = {}) {
  Object.assign(state, extra)
  state.view = view
  render()
  window.scrollTo(0, 0)
}

function render() {
  const app = document.getElementById('app')
  const views = {
    login: renderLogin,
    doctorDashboard: renderDoctorDashboard,
    doctorPatient: renderDoctorPatient,
    doctorReferrals: renderDoctorReferrals,
    doctorMessages: renderDoctorMessages,
    doctorLabs: renderDoctorLabs,
    patientDashboard: renderPatientDashboard,
    patientShop: renderPatientShop,
    patientOrders: renderPatientOrders,
    patientTelehealth: renderPatientTelehealth,
    patientMessages: renderPatientMessages,
    patientLabs: renderPatientLabs,
    patientCheckins: renderPatientCheckins,
    doctorWallet: renderDoctorWallet,
    doctorCheckins: renderDoctorCheckins,
    doctorIntegrations: renderDoctorIntegrations,
  }
  app.innerHTML = views[state.view]?.() ?? '<p class="p-8 text-gray-400">Unknown view</p>'
  attachHandlers()
}

// ─── UTILITIES ───────────────────────────────────────────────────────────────
function categoryBadge(cat) {
  const styles = { peptide: 'bg-violet-100 text-violet-700', supplement: 'bg-emerald-100 text-emerald-700', lab: 'bg-blue-100 text-blue-700', skincare: 'bg-pink-100 text-pink-700' }
  return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${styles[cat] || 'bg-gray-100 text-gray-600'}">${cat.charAt(0).toUpperCase() + cat.slice(1)}</span>`
}

function statusBadge(status) {
  const styles = { delivered: 'bg-emerald-100 text-emerald-700', processing: 'bg-amber-100 text-amber-700', active: 'bg-blue-100 text-blue-700', pending: 'bg-amber-100 text-amber-600', settled: 'bg-emerald-100 text-emerald-700', paid: 'bg-gray-100 text-gray-500' }
  return `<span class="px-2.5 py-1 rounded-full text-xs font-medium ${styles[status] || 'bg-gray-100 text-gray-600'}">${status.charAt(0).toUpperCase() + status.slice(1)}</span>`
}

function showNotification(msg) {
  state.notification = msg
  render()
  setTimeout(() => { state.notification = null; render() }, 2800)
}

function notificationBanner() {
  if (!state.notification) return ''
  return `<div class="fixed top-5 right-5 z-50 bg-emerald-500 text-white px-5 py-3 rounded-xl shadow-xl text-sm font-medium fade-in flex items-center gap-2"><span>✓</span> ${state.notification}</div>`
}

// DOCTOR — LABS
// ═══════════════════════════════════════════════════════════════════════════════
function renderDoctorLabs() {
  const filter = state.labFilter || 'all'
  const newCount = labResults.filter(l => l.status === 'resulted').length
  const filtered = filter === 'all' ? labResults : labResults.filter(l => l.status === filter)
  const sorted = [...filtered].sort((a, b) => {
    if (a.status === 'resulted' && b.status !== 'resulted') return -1
    if (b.status === 'resulted' && a.status !== 'resulted') return 1
    return new Date(b.resultDate || b.orderedDate) - new Date(a.resultDate || a.orderedDate)
  })
  const selected = state.selectedLab
    ? labResults.find(l => l.id === state.selectedLab)
    : sorted[0]

  return wrap(doctorSidebar('doctorLabs'), `
    <div class="flex overflow-hidden fade-in" style="height:100vh;">
      <!-- Left: List -->
      <div class="w-96 bg-white border-r border-gray-100 flex flex-col flex-shrink-0 overflow-hidden">
        <div class="p-5 border-b border-gray-100">
          <div class="flex items-center justify-between mb-4">
            <h1 class="font-bold text-gray-900 text-lg">Lab Results</h1>
            ${newCount > 0 ? `
              <div class="flex items-center gap-2 bg-rose-50 border border-rose-200 rounded-xl px-3 py-2">
                <div class="w-5 h-5 bg-rose-500 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${newCount}</div>
                <span class="text-xs font-semibold text-rose-700">${newCount} new result${newCount !== 1 ? 's' : ''}</span>
              </div>
            ` : ''}
          </div>
          <div class="flex gap-1.5">
            ${[['all','All'], ['resulted','New'], ['reviewed','Reviewed']].map(([f, label]) => `
              <button onclick="navigate('doctorLabs', {labFilter: '${f}', selectedLab: ${selected?.id ?? null}})"
                class="flex-1 py-1.5 rounded-lg text-xs font-medium transition-colors ${filter === f ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-gray-600 hover:bg-slate-200'}">
                ${label}${f === 'resulted' && newCount > 0 ? ` (${newCount})` : ''}
              </button>
            `).join('')}
          </div>
        </div>
        <div class="flex-1 overflow-y-auto divide-y divide-gray-50">
          ${sorted.length === 0 ? `
            <div class="p-8 text-center text-sm text-gray-400">No results in this category</div>
          ` : sorted.map(lab => {
            const pat = patients.find(p => p.id === lab.patientId)
            const prod = products.find(p => p.id === lab.productId)
            const isNew = lab.status === 'resulted'
            const isSel = selected?.id === lab.id
            const abnormal = lab.markers ? lab.markers.filter(m => m.flag !== 'normal').length : 0
            return `
              <div onclick="navigate('doctorLabs', {selectedLab: ${lab.id}, labFilter: '${filter}'})"
                class="p-4 cursor-pointer transition-colors ${isSel ? 'bg-indigo-50 border-r-2 border-indigo-500' : 'hover:bg-slate-50'}">
                <div class="flex items-start gap-3">
                  <div class="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-xs flex-shrink-0 mt-0.5">${pat?.avatar}</div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-1.5 mb-0.5">
                      <span class="font-medium text-gray-900 text-sm">${pat?.name}</span>
                      ${isNew ? '<span class="w-2 h-2 rounded-full bg-rose-500 inline-block flex-shrink-0"></span>' : ''}
                    </div>
                    <div class="text-xs text-gray-500">${prod?.name}</div>
                    <div class="flex items-center gap-2 mt-1.5">
                      <span class="text-xs text-gray-400">${lab.resultDate ? 'Resulted ' + lab.resultDate : 'Ordered ' + lab.orderedDate}</span>
                      ${abnormal > 0 ? `<span class="text-xs text-amber-600 font-medium">⚠ ${abnormal} out of range</span>` : ''}
                    </div>
                  </div>
                  <div class="flex-shrink-0">
                    ${isNew
                      ? '<span class="text-xs bg-rose-100 text-rose-700 px-2 py-0.5 rounded-full font-medium">New</span>'
                      : '<span class="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-medium">Reviewed</span>'
                    }
                  </div>
                </div>
              </div>
            `
          }).join('')}
        </div>
      </div>

      <!-- Right: Detail -->
      <div class="flex-1 overflow-y-auto">
        ${selected ? renderLabDetail(selected) : `
          <div class="h-full flex items-center justify-center text-gray-400">
            <div class="text-center">
              <div class="text-5xl mb-4">🧪</div>
              <div class="text-sm font-medium">Select a result to view details</div>
            </div>
          </div>
        `}
      </div>
    </div>
  `)
}

              <tr class="${m.flag !== 'normal' ? 'bg-amber-50' : 'hover:bg-slate-50'} transition-colors">
                <td class="px-5 py-3.5 font-medium text-gray-800">${m.name}</td>
                <td class="px-5 py-3.5 text-right font-bold ${m.flag === 'high' ? 'text-rose-600' : m.flag === 'low' ? 'text-amber-600' : 'text-gray-900'}">${m.value} <span class="font-normal text-gray-400 text-xs">${m.unit}</span></td>
                <td class="px-5 py-3.5 text-right text-gray-400 text-xs">${m.range}</td>
                <td class="px-5 py-3.5 text-center">
                  ${m.flag === 'high'
                    ? '<span class="bg-rose-100 text-rose-700 text-xs font-bold px-2 py-0.5 rounded">H</span>'
                    : m.flag === 'low'
                    ? '<span class="bg-amber-100 text-amber-700 text-xs font-bold px-2 py-0.5 rounded">L</span>'
                    : '<span class="text-emerald-500 text-sm">✓</span>'
                  }
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <!-- Doctor Notes -->
      <div class="bg-white border border-gray-100 rounded-xl shadow-sm overflow-hidden">
        <div class="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">
          <h3 class="font-semibold text-gray-700 text-sm">Doctor Notes</h3>
          <span class="text-xs text-gray-400">Visible to patient once saved</span>
        </div>
        <div class="p-5">
          <textarea id="labNotesField_${lab.id}" class="w-full text-sm text-gray-700 bg-slate-50 rounded-xl p-4 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none leading-relaxed" rows="4" placeholder="Add clinical interpretation, follow-up instructions, or recommendations for this patient...">${lab.doctorNotes}</textarea>
          <div class="mt-3 flex gap-2">
            <button onclick="saveLabNotes(${lab.id})" class="px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 transition-colors">Save Notes</button>
            ${isNew ? `<button onclick="markLabReviewed(${lab.id})" class="px-4 py-2 bg-emerald-600 text-white text-sm font-semibold rounded-lg hover:bg-emerald-700 transition-colors">Save & Mark Reviewed</button>` : ''}
          </div>
        </div>
      </div>
    </div>
  `
}

// PATIENT — ORDERS
// ═══════════════════════════════════════════════════════════════════════════════
function renderPatientOrders() {
  const patient = patients[0]
  const myOrders = orderHistory.filter(o => o.patientId === patient.id)
    .sort((a, b) => new Date(b.orderedDate) - new Date(a.orderedDate))
  const inTransit = myOrders.filter(o => o.status === 'in_transit' || o.status === 'processing')
  const completed = myOrders.filter(o => o.status === 'delivered')

  const statusStyles = {
    delivered:   { bg: 'bg-emerald-100', text: 'text-emerald-700', label: 'Delivered' },
    in_transit:  { bg: 'bg-blue-100',    text: 'text-blue-700',    label: 'In Transit' },
    processing:  { bg: 'bg-amber-100',   text: 'text-amber-700',   label: 'Processing' },
  }

  function trackingTimeline(order) {
    const steps = order.tracking
    const lastDone = steps.reduce((last, s, i) => s.done ? i : last, -1)
    return `
      <div class="mt-4 pt-4 border-t border-gray-100">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs font-semibold text-gray-600 uppercase tracking-wide">Tracking</span>
          ${order.trackingNumber ? `
            <div class="flex items-center gap-2">
              <span class="text-xs text-gray-400">${order.carrier} · ${order.trackingNumber}</span>
            </div>
          ` : ''}
        </div>
        <div class="space-y-0">
          ${steps.map((step, i) => {
            const isLatest = i === lastDone
            const isDone = step.done
            return `
              <div class="flex gap-3 ${i < steps.length - 1 ? 'pb-3' : ''}">
                <!-- Icon + line -->
                <div class="flex flex-col items-center flex-shrink-0">
                  <div class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 ${isLatest ? 'bg-indigo-600 ring-4 ring-indigo-100' : isDone ? 'bg-emerald-500' : 'bg-gray-200'}">
                    ${isLatest
                      ? '<svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14M12 5l7 7-7 7"/></svg>'
                      : isDone
                      ? '<svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>'
                      : '<div class="w-2 h-2 rounded-full bg-gray-400"></div>'
                    }
                  </div>
                  ${i < steps.length - 1 ? `<div class="w-px flex-1 mt-1 ${isDone ? 'bg-emerald-300' : 'bg-gray-200'}"></div>` : ''}
                </div>
                <!-- Content -->
                <div class="flex-1 pb-0.5">
                  <div class="flex items-baseline gap-2 flex-wrap">
                    <span class="text-sm font-medium ${isDone ? 'text-gray-900' : 'text-gray-400'}">${step.event}</span>
                    ${step.time ? `<span class="text-xs text-gray-400">${step.date} · ${step.time}</span>` : step.date ? `<span class="text-xs text-gray-400">${step.date}</span>` : '<span class="text-xs text-gray-400">Estimated</span>'}
                  </div>
                  ${step.location ? `<div class="text-xs text-gray-400 mt-0.5">${step.location}</div>` : ''}
                </div>
              </div>
            `
          }).join('')}
        </div>
        ${order.estimatedDelivery && order.status !== 'delivered' ? `
          <div class="mt-3 p-3 bg-indigo-50 rounded-lg text-xs text-indigo-700 font-medium">
            Estimated delivery: <strong>${order.estimatedDelivery}</strong>
          </div>
        ` : ''}
      </div>
    `
  }

  return wrap(patientSidebar('patientOrders'), `
    <div class="p-8 max-w-3xl fade-in">
      <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Orders</h1>
        <p class="text-gray-400 mt-1 text-sm">${myOrders.length} order${myOrders.length !== 1 ? 's' : ''} total · ${inTransit.length} in transit</p>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4 mb-8">
        <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-gray-900">${myOrders.length}</div>
          <div class="text-xs text-gray-400 mt-1">Total Orders</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-blue-600">${inTransit.length}</div>
          <div class="text-xs text-gray-400 mt-1">In Transit</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-emerald-600">${completed.length}</div>
          <div class="text-xs text-gray-400 mt-1">Delivered</div>
        </div>
      </div>

      <!-- In Transit -->
      ${inTransit.length > 0 ? `
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">In Transit & Processing</h2>
        <div class="space-y-4 mb-8">
          ${inTransit.map(order => {
            const s = statusStyles[order.status]
            return `
              <div class="bg-white border border-gray-100 rounded-2xl shadow-sm overflow-hidden">
                <div class="p-5">
                  <div class="flex items-start justify-between gap-4">
                    <div class="flex items-center gap-3">
                      <span class="text-3xl">${order.productIcon}</span>
                      <div>
                        <div class="font-bold text-gray-900">${order.productName}</div>
                        <div class="text-xs text-gray-400 mt-0.5">Ordered ${order.orderedDate} · $${order.amount}</div>
                      </div>
                    </div>
                    <span class="text-xs font-semibold px-3 py-1.5 rounded-full ${s.bg} ${s.text} flex-shrink-0">${s.label}</span>
                  </div>
                  ${trackingTimeline(order)}
                </div>
              </div>
            `
          }).join('')}
        </div>
      ` : ''}

      <!-- Completed -->
      ${completed.length > 0 ? `
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">Delivered</h2>
        <div class="space-y-3">
          ${completed.map(order => {
            const s = statusStyles[order.status]
            const expanded = state.expandedOrder === order.id
            return `
              <div class="bg-white border border-gray-100 rounded-2xl shadow-sm overflow-hidden">
                <div class="p-5">
                  <div class="flex items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                      <span class="text-2xl">${order.productIcon}</span>
                      <div>
                        <div class="font-semibold text-gray-900">${order.productName}</div>
                        <div class="text-xs text-gray-400 mt-0.5">Ordered ${order.orderedDate} · Delivered ${order.deliveredDate}</div>
                      </div>
                    </div>
                    <div class="flex items-center gap-3 flex-shrink-0">
                      <span class="font-bold text-gray-700">$${order.amount}</span>
                      <span class="text-xs font-semibold px-3 py-1.5 rounded-full ${s.bg} ${s.text}">${s.label}</span>
                      <button onclick="navigate('patientOrders', {expandedOrder: ${expanded ? 'null' : order.id}})" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium transition-colors">
                        ${expanded ? 'Hide' : 'Tracking'}
                      </button>
                    </div>
                  </div>
                  ${expanded ? trackingTimeline(order) : ''}
                </div>
              </div>
            `
          }).join('')}
        </div>
      ` : ''}
    </div>
  `)
}

// PATIENT — TELEHEALTH

                  <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>

            </div>

            <button
              onclick="${state.scheduleType && state.scheduleDate && state.scheduleTime ? `confirmAppointment()` : ''}"
              class="w-full py-3 rounded-xl font-semibold text-sm transition-colors ${state.scheduleType && state.scheduleDate && state.scheduleTime ? 'bg-teal-600 text-white hover:bg-teal-700' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}">
              ${state.scheduleType && state.scheduleDate && state.scheduleTime

                : 'Select a type, date, and time to continue'}

        </div>
      </div>
    ` : ''}
  `)
}

              }

            ${lab.markers ? `
              <table class="w-full text-sm">
                <thead class="bg-slate-50 border-b border-gray-100">
                  <tr class="text-xs text-gray-400 uppercase tracking-wide">
                    <th class="px-5 py-3 text-left">Marker</th>
                    <th class="px-5 py-3 text-right">Your Result</th>
                    <th class="px-5 py-3 text-right">Reference Range</th>
                    <th class="px-5 py-3 text-center">Status</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                  ${lab.markers.map(m => `
                    <tr class="${m.flag !== 'normal' ? 'bg-amber-50' : ''}">
                      <td class="px-5 py-3.5 font-medium text-gray-800">${m.name}</td>
                      <td class="px-5 py-3.5 text-right font-bold ${m.flag === 'high' ? 'text-rose-600' : m.flag === 'low' ? 'text-amber-600' : 'text-gray-900'}">${m.value} <span class="font-normal text-gray-400 text-xs">${m.unit}</span></td>

                      <td class="px-5 py-3.5 text-center">
                        ${m.flag === 'high'
                          ? '<span class="bg-rose-100 text-rose-700 text-xs font-semibold px-2.5 py-1 rounded-full">High ↑</span>'
                          : m.flag === 'low'
                          ? '<span class="bg-amber-100 text-amber-700 text-xs font-semibold px-2.5 py-1 rounded-full">Low ↓</span>'
                          : '<span class="text-emerald-600 text-xs font-medium">Normal ✓</span>'
                        }
                      </td>
                    </tr>
                  `).join('')}
                </tbody>

            ` : ''}

            ${lab.doctorNotes ? `
              <div class="p-5 bg-indigo-50 border-t border-indigo-100">
                <div class="flex items-start gap-3">

            ` : ''}
          </div>
        `
      }).join('')}
    </div>
  `)
}

// DOCTOR — CHECK-INS
// ═══════════════════════════════════════════════════════════════════════════════
function renderDoctorCheckins() {
  const filter = state.checkinFilter || 'unreviewed'
  const newCount = checkins.filter(c => c.status === 'unreviewed').length
  const filtered = filter === 'all' ? checkins : checkins.filter(c => c.status === filter)
  const sorted = [...filtered].sort((a, b) => {
    if (a.status === 'unreviewed' && b.status !== 'unreviewed') return -1
    if (b.status === 'unreviewed' && a.status !== 'unreviewed') return 1
    return new Date(b.date) - new Date(a.date)
  })
  const selected = state.selectedCheckin
    ? checkins.find(c => c.id === state.selectedCheckin)
    : sorted[0]

  const scoreColor = n => n >= 7 ? 'text-emerald-600' : n >= 4 ? 'text-amber-500' : 'text-rose-500'
  const scoreBg    = n => n >= 7 ? 'bg-emerald-50 border-emerald-200' : n >= 4 ? 'bg-amber-50 border-amber-200' : 'bg-rose-50 border-rose-200'

  return wrap(doctorSidebar('doctorCheckins'), `
    <div class="flex overflow-hidden fade-in" style="height:100vh;">
      <!-- Left: List -->
      <div class="w-96 bg-white border-r border-gray-100 flex flex-col flex-shrink-0 overflow-hidden">
        <div class="p-5 border-b border-gray-100">
          <div class="flex items-center justify-between mb-4">
            <h1 class="font-bold text-gray-900 text-lg">Patient Check-ins</h1>
            ${newCount > 0 ? `
              <div class="flex items-center gap-2 bg-rose-50 border border-rose-200 rounded-xl px-3 py-2">
                <div class="w-5 h-5 bg-rose-500 rounded-full flex items-center justify-center text-white text-xs font-bold">${newCount}</div>
                <span class="text-xs font-semibold text-rose-700">${newCount} unreviewed</span>
              </div>
            ` : ''}
          </div>
          <div class="flex gap-1.5">
            ${[['unreviewed','Unreviewed'], ['all','All']].map(([f, label]) => `
              <button onclick="navigate('doctorCheckins', {checkinFilter: '${f}', selectedCheckin: ${selected?.id ?? null}})"
                class="flex-1 py-1.5 rounded-lg text-xs font-medium transition-colors ${filter === f ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-gray-600 hover:bg-slate-200'}">
                ${label}${f === 'unreviewed' && newCount > 0 ? ` (${newCount})` : ''}
              </button>
            `).join('')}
          </div>
        </div>
        <div class="flex-1 overflow-y-auto divide-y divide-gray-50">
          ${sorted.length === 0 ? `
            <div class="p-8 text-center text-sm text-gray-400">No check-ins in this category</div>
          ` : sorted.map(ci => {
            const pat = patients.find(p => p.id === ci.patientId)
            const isNew = ci.status === 'unreviewed'
            const isSel = selected?.id === ci.id
            return `
              <div onclick="navigate('doctorCheckins', {selectedCheckin: ${ci.id}, checkinFilter: '${filter}'})"
                class="p-4 cursor-pointer transition-colors ${isSel ? 'bg-indigo-50 border-r-2 border-indigo-500' : 'hover:bg-slate-50'}">
                <div class="flex items-start gap-3">
                  <div class="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-xs flex-shrink-0">${pat?.avatar}</div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-1.5 mb-0.5">
                      <span class="font-medium text-gray-900 text-sm">${pat?.name}</span>
                      ${isNew ? '<span class="w-2 h-2 rounded-full bg-rose-500 inline-block"></span>' : ''}
                      ${ci.flagged ? '<span class="text-xs ml-0.5">🚩</span>' : ''}
                    </div>
                    <div class="text-xs text-gray-400 mb-1.5">${ci.date}</div>
                    <div class="flex gap-2 flex-wrap">
                      <span class="text-xs font-semibold ${scoreColor(ci.energy)}">E ${ci.energy}</span>
                      <span class="text-gray-300">·</span>
                      <span class="text-xs font-semibold ${scoreColor(ci.sleep)}">S ${ci.sleep}</span>
                      <span class="text-gray-300">·</span>
                      <span class="text-xs font-semibold ${scoreColor(ci.mood)}">M ${ci.mood}</span>
                      ${ci.sideEffects ? '<span class="text-xs text-amber-600 font-medium ml-1">⚠ Side effects</span>' : ''}
                    </div>
                  </div>
                  <div class="flex-shrink-0">
                    ${isNew
                      ? '<span class="text-xs bg-rose-100 text-rose-700 px-2 py-0.5 rounded-full font-medium">New</span>'
                      : '<span class="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-medium">Done</span>'
                    }
                  </div>
                </div>
              </div>
            `
          }).join('')}
        </div>
      </div>

      <!-- Right: Detail -->
      <div class="flex-1 overflow-y-auto">
        ${selected ? renderCheckinDetail(selected, scoreColor, scoreBg) : `
          <div class="h-full flex items-center justify-center text-gray-400">
            <div class="text-center">
              <div class="text-5xl mb-4">📋</div>

            </div>
          </div>
        `}
      </div>
    </div>
  `)
}

function renderCheckinDetail(ci, scoreColor, scoreBg) {
  const pat = patients.find(p => p.id === ci.patientId)
  const isNew = ci.status === 'unreviewed'

  return `
    <div class="p-6 fade-in">
      <!-- Header -->
      <div class="flex items-start justify-between mb-6 gap-4">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold">${pat?.avatar}</div>
          <div>
            <button onclick="navigate('doctorPatient', {selectedPatient: ${pat?.id}})" class="font-bold text-gray-900 hover:text-indigo-600 transition-colors">${pat?.name}</button>
            <div class="text-xs text-gray-400 mt-0.5">Check-in submitted ${ci.date}</div>
          </div>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          <button onclick="flagCheckin(${ci.id})"
            class="px-3 py-2 text-sm rounded-lg border transition-colors ${ci.flagged ? 'bg-rose-50 border-rose-300 text-rose-600 font-semibold' : 'border-gray-200 text-gray-500 hover:border-rose-300 hover:text-rose-500'}">
            ${ci.flagged ? '🚩 Flagged' : '🚩 Flag'}
          </button>
          ${isNew ? `
            <button onclick="markCheckinReviewed(${ci.id})"
              class="px-4 py-2 bg-emerald-600 text-white text-sm font-semibold rounded-xl hover:bg-emerald-700 transition-colors flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              Mark Reviewed
            </button>
          ` : ''}
        </div>
      </div>

      <!-- Scores -->
      <div class="grid grid-cols-3 gap-4 mb-5">
        ${[['Energy', ci.energy], ['Sleep', ci.sleep], ['Mood', ci.mood]].map(([label, val]) => `
          <div class="bg-white border ${scoreBg(val)} rounded-xl p-4 text-center">
            <div class="text-xs text-gray-400 uppercase tracking-wide mb-2">${label}</div>
            <div class="text-4xl font-bold ${scoreColor(val)}">${val}</div>
            <div class="text-xs text-gray-400 mt-1">out of 10</div>
            <div class="mt-3 h-1.5 bg-gray-100 rounded-full overflow-hidden">
              <div class="h-full rounded-full ${val >= 7 ? 'bg-emerald-400' : val >= 4 ? 'bg-amber-400' : 'bg-rose-400'}" style="width:${val * 10}%"></div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Side Effects + Patient Notes -->
      <div class="bg-white border border-gray-100 rounded-xl shadow-sm p-5 mb-5 space-y-4">
        <div>
          <h3 class="font-semibold text-gray-700 text-sm mb-2">Side Effects</h3>
          ${ci.sideEffects ? `
            <div class="flex items-start gap-2 text-amber-700 bg-amber-50 rounded-lg p-3">
              <span class="text-base mt-0.5">⚠️</span>
              <div class="text-sm font-medium">Side effects reported</div>
            </div>
          ` : `
            <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              No side effects reported
            </div>
          `}
        </div>
        ${ci.notes ? `
          <div>
            <h3 class="font-semibold text-gray-700 text-sm mb-2">Patient Notes</h3>
            <div class="text-sm text-gray-700 leading-relaxed bg-slate-50 rounded-lg p-3.5">${ci.notes}</div>
          </div>
        ` : ''}
      </div>

      <!-- Doctor Notes -->
      <div class="bg-white border border-gray-100 rounded-xl shadow-sm overflow-hidden">
        <div class="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">
          <h3 class="font-semibold text-gray-700 text-sm">Your Response</h3>
          <span class="text-xs text-gray-400">Visible to patient</span>
        </div>
        <div class="p-5">
          <textarea id="checkinNotesField_${ci.id}" class="w-full text-sm text-gray-700 bg-slate-50 rounded-xl p-4 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none leading-relaxed" rows="3" placeholder="Add feedback, protocol adjustments, or encouragement...">${ci.doctorNotes}</textarea>
          <div class="mt-3 flex gap-2">
            <button onclick="saveCheckinNotes(${ci.id})" class="px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 transition-colors">Save</button>
            ${isNew ? `<button onclick="markCheckinReviewed(${ci.id})" class="px-4 py-2 bg-emerald-600 text-white text-sm font-semibold rounded-lg hover:bg-emerald-700 transition-colors">Save & Mark Reviewed</button>` : ''}
          </div>
        </div>
      </div>
    </div>
  `
}

// ─── HANDLERS ─────────────────────────────────────────────────────────────────
function attachHandlers() {
  const addBtn = document.getElementById('addProductBtn')
  if (addBtn) addBtn.onclick = () => document.getElementById('productModal')?.classList.remove('hidden')

  const refBtn = document.getElementById('referBtn')
  if (refBtn) refBtn.onclick = () => document.getElementById('referModal')?.classList.remove('hidden')
}

function addToPlan(patientId, productId) {
  const p = patients.find(p => p.id === patientId)
  if (p && !p.carePlan.includes(productId)) {
    p.carePlan.push(productId)
    showNotification('Added to care plan')
  }
}

function removeFromPlan(patientId, productId) {
  const p = patients.find(p => p.id === patientId)
  if (p) {
    p.carePlan = p.carePlan.filter(id => id !== productId)
    navigate('doctorPatient', { selectedPatient: patientId, patientTab: 'careplan' })
  }
}

function saveInstructions(patientId) {
  const p = patients.find(p => p.id === patientId)
  const field = document.getElementById('instrField')
  if (p && field) p.instructions = field.value
  showNotification('Care instructions saved')
}

function addToCart(productId) {
  if (!state.cart.includes(productId)) state.cart.push(productId)
  showNotification('Added to cart')
  render()
}

function checkout() {
  const count = state.cart.length
  state.cart = []
  showNotification(`Order placed — ${count} item${count !== 1 ? 's' : ''} confirmed!`)
}

function confirmAppointment() {
  appointments.push({
    id: appointments.length + 1, patientId: 1, doctorId: 1,
    date: state.scheduleDate, time: state.scheduleTime, duration: 30,
    type: state.scheduleType, status: 'upcoming',
    reason: 'Scheduled via patient portal.',
    joinUrl: '#',
  })
  navigate('patientTelehealth', { showScheduleModal: false, scheduleType: null, scheduleDate: null, scheduleTime: null })
  showNotification(`Appointment confirmed — ${state.scheduleType} on ${state.scheduleDate}`)
}

function saveLabNotes(labId) {
  const lab = labResults.find(l => l.id === labId)
  const field = document.getElementById('labNotesField_' + labId)
  if (lab && field) lab.doctorNotes = field.value
  showNotification('Notes saved')
}

function markLabReviewed(labId) {
  const lab = labResults.find(l => l.id === labId)
  if (lab) {
    const field = document.getElementById('labNotesField_' + labId)
    if (field) lab.doctorNotes = field.value
    lab.status = 'reviewed'
  }
  navigate('doctorLabs', { selectedLab: labId, labFilter: state.labFilter || 'all' })
  showNotification('Lab result marked as reviewed')
}

function submitCheckin() {
  const energy = parseInt(document.getElementById('ciEnergy')?.value || 5)
  const sleep  = parseInt(document.getElementById('ciSleep')?.value  || 5)
  const mood   = parseInt(document.getElementById('ciMood')?.value   || 5)
  const notes  = document.getElementById('ciNotes')?.value || ''
  const seDetail = document.getElementById('seDetail')?.value || ''
  checkins.unshift({
    id: checkins.length + 1, patientId: 1, date: '2026-04-06',
    energy, sleep, mood,
    sideEffects: state.checkinSideEffects || false,
    notes: seDetail || notes,
    status: 'unreviewed', doctorNotes: '', flagged: false,
  })
  navigate('patientCheckins', { checkinTab: 'history', checkinSideEffects: false })
  showNotification('Check-in submitted — Dr. Chen will review it shortly')
}

function toggleSideEffects(val) {
  state.checkinSideEffects = val
  const noBtn  = document.getElementById('seNoBtn')
  const yesBtn = document.getElementById('seYesBtn')
  const detail = document.getElementById('seDetail')
  if (noBtn)   noBtn.className  = `flex-1 py-2.5 rounded-xl border text-sm font-medium transition-colors ${!val ? 'bg-emerald-50 border-emerald-400 text-emerald-700' : 'border-gray-200 text-gray-500 hover:border-gray-300'}`
  if (yesBtn)  yesBtn.className = `flex-1 py-2.5 rounded-xl border text-sm font-medium transition-colors ${val  ? 'bg-rose-50 border-rose-400 text-rose-700'       : 'border-gray-200 text-gray-500 hover:border-gray-300'}`
  if (detail)  detail.classList.toggle('hidden', !val)
}

function saveCheckinNotes(checkinId) {
  const ci = checkins.find(c => c.id === checkinId)
  const field = document.getElementById('checkinNotesField_' + checkinId)
  if (ci && field) ci.doctorNotes = field.value
  showNotification('Response saved')
}

function flagCheckin(checkinId) {
  const ci = checkins.find(c => c.id === checkinId)
  if (ci) ci.flagged = !ci.flagged
  navigate('doctorCheckins', { selectedCheckin: checkinId, checkinFilter: state.checkinFilter || 'unreviewed' })
  showNotification(ci?.flagged ? 'Check-in flagged' : 'Flag removed')
}

function markCheckinReviewed(checkinId) {
  const ci = checkins.find(c => c.id === checkinId)
  if (ci) {
    const field = document.getElementById('checkinNotesField_' + checkinId)
    if (field) ci.doctorNotes = field.value
    ci.status = 'reviewed'
  }
  navigate('doctorCheckins', { selectedCheckin: checkinId, checkinFilter: state.checkinFilter || 'unreviewed' })
  showNotification('Check-in marked as reviewed')
}

function scrollCarousel(dir) {
  const el = document.getElementById('discoverCarousel')
  if (el) el.scrollBy({ left: dir * 480, behavior: 'smooth' })
}

function requestPayout() {
  showNotification('Payout requested — ACH transfer initiated to Chase ····4821')
}

function handleReferral(patientId, toDoctorId) {
  const toDoc = doctors.find(d => d.id === toDoctorId)
  document.getElementById('referModal')?.classList.add('hidden')
  showNotification(`Patient referred to ${toDoc?.name}`)
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render()
</script>
