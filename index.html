// ─── ROUTER ──────────────────────────────────────────────────────────────────
function navigate(view, extra = {}) {
  Object.assign(state, extra)
  state.view = view
  render()
  window.scrollTo(0, 0)
}

function render() {

    doctorDashboard: renderDoctorDashboard,
    doctorPatient: renderDoctorPatient,
    doctorReferrals: renderDoctorReferrals,
    doctorMessages: renderDoctorMessages,
    patientDashboard: renderPatientDashboard,
    patientShop: renderPatientShop,
    patientMessages: renderPatientMessages,
  }
  app.innerHTML = views[state.view]?.() ?? '<p class="p-8 text-gray-400">Unknown view</p>'
  attachHandlers()
}

// ─── UTILITIES ───────────────────────────────────────────────────────────────
function categoryBadge(cat) {
  const styles = { peptide: 'bg-violet-100 text-violet-700', supplement: 'bg-emerald-100 text-emerald-700', lab: 'bg-blue-100 text-blue-700' }
  return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${styles[cat] || 'bg-gray-100 text-gray-600'}">${cat.charAt(0).toUpperCase() + cat.slice(1)}</span>`
}

function statusBadge(status) {
  const styles = { delivered: 'bg-emerald-100 text-emerald-700', processing: 'bg-amber-100 text-amber-700', active: 'bg-blue-100 text-blue-700', pending: 'bg-gray-100 text-gray-500' }
  return `<span class="px-2.5 py-1 rounded-full text-xs font-medium ${styles[status] || 'bg-gray-100 text-gray-600'}">${status.charAt(0).toUpperCase() + status.slice(1)}</span>`
}

function showNotification(msg) {
  state.notification = msg
  render()
  setTimeout(() => { state.notification = null; render() }, 2800)
}

function notificationBanner() {
  if (!state.notification) return ''
  return `<div class="fixed top-5 right-5 z-50 bg-emerald-500 text-white px-5 py-3 rounded-xl shadow-xl text-sm font-medium fade-in flex items-center gap-2"><span>✓</span> ${state.notification}</div>`

// ─── HANDLERS ─────────────────────────────────────────────────────────────────
function attachHandlers() {
  const addBtn = document.getElementById('addProductBtn')
  if (addBtn) addBtn.onclick = () => document.getElementById('productModal')?.classList.remove('hidden')

  const refBtn = document.getElementById('referBtn')
  if (refBtn) refBtn.onclick = () => document.getElementById('referModal')?.classList.remove('hidden')
}

function addToPlan(patientId, productId) {
  const p = patients.find(p => p.id === patientId)
  if (p && !p.carePlan.includes(productId)) {
    p.carePlan.push(productId)
    showNotification('Added to care plan')
  }
}

function removeFromPlan(patientId, productId) {
  const p = patients.find(p => p.id === patientId)
  if (p) {
    p.carePlan = p.carePlan.filter(id => id !== productId)
    navigate('doctorPatient', { selectedPatient: patientId, patientTab: 'careplan' })
  }
}

function saveInstructions(patientId) {
  const p = patients.find(p => p.id === patientId)
  const field = document.getElementById('instrField')
  if (p && field) p.instructions = field.value
  showNotification('Care instructions saved')
}

function addToCart(productId) {
  if (!state.cart.includes(productId)) state.cart.push(productId)
  showNotification('Added to cart')
  render()
}

function checkout() {
  const count = state.cart.length
  state.cart = []
  showNotification(`Order placed — ${count} item${count !== 1 ? 's' : ''} confirmed!`)
}

function handleReferral(patientId, toDoctorId) {
  const toDoc = doctors.find(d => d.id === toDoctorId)
  document.getElementById('referModal')?.classList.add('hidden')
  showNotification(`Patient referred to ${toDoc?.name}`)
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render()
</script>
